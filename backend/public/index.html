<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ItudeAgent — Eternos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Canvas para renderizar a geometria de Eternos -->
  <canvas id="cosmic-canvas"></canvas>

  <!-- Player de áudio oculto para o retorno de TTS -->
  <audio id="player" controls style="display: none;"></audio>

  <!-- Indicador de Status Central superior -->
  <div id="top-indicator">Pausado</div>

  <!-- Painel Esquerdo (Configurações / Sistema) -->
  <div id="left-panel" class="panel">
    <div class="panel-trigger">Sistema</div>
    <h2>Sistema</h2>
    <div class="control-group">
      <label for="model-selector">Modelo Ollama</label>
      <select id="model-selector">
        <option value="">Carregando...</option>
      </select>
    </div>
    <div class="control-group" style="margin-top: auto;">
      <label>Atalhos</label>
      <div style="font-size: 0.8rem; color: #888; line-height: 1.5;">
        <kbd style="color: var(--color-gold);">[Espaço]</kbd> Ativa / Pausa mic<br>
        <kbd style="color: var(--color-gold);">[Clique Tela]</kbd> Ativa / Pausa mic
      </div>
    </div>
  </div>

  <!-- Painel Direito (Logs de Conversa / Conexão) -->
  <div id="right-panel" class="panel">
    <div class="panel-trigger">Conexão</div>
    <h2>Conexão Neural</h2>
    <div id="chat-log">
      <div class="log-entry system">Conexão estabelecida com ItudeAgent. Pressione ESPAÇO ou clique no centro da tela para falar.</div>
    </div>
  </div>

  <!-- Logo Central de Fundo -->
  <div id="center-info">
    <h1>ItudeAgent</h1>
    <p>Assistente Adaptativo Cósmico</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
